<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .lane { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; }
      .lane-title { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4338ca; }
      .box-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box-line { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .note { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .vt { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .tool { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .req { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .inst { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 2; }
      .acbs { fill: #fef2f2; stroke: #f87171; stroke-width: 2; }
      .field { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>

  <text class="title" x="48" y="48">AGS Volume 实体关系</text>
  <text class="subtitle" x="48" y="74">从存储声明到 Tool 绑定，再到实例启动时解析出最终挂载结果；AgentCBS 由 VolumeTemplate 派生并绑定到实例。</text>

  <rect class="lane" x="38" y="100" width="282" height="470" rx="18"/>
  <rect class="lane" x="350" y="100" width="282" height="470" rx="18"/>
  <rect class="lane" x="662" y="100" width="282" height="470" rx="18"/>
  <rect class="lane" x="974" y="100" width="268" height="470" rx="18"/>

  <text class="lane-title" x="62" y="130">1. 存储声明</text>
  <text class="lane-title" x="374" y="130">2. Tool 声明</text>
  <text class="lane-title" x="686" y="130">3. 启动实例</text>
  <text class="lane-title" x="998" y="130">4. 实例结果</text>

  <g filter="url(#shadow)">
    <rect class="vt" x="62" y="158" width="234" height="150" rx="16"/>
    <text class="box-title" x="86" y="190">VolumeTemplate</text>
    <text class="box-line" x="86" y="222">存储声明资源</text>
    <text class="box-line" x="86" y="248">COS / CFS / Agent Bucket</text>
    <text class="box-line" x="86" y="274">或 AgentCBS 派生规则</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="field" x="72" y="344" width="214" height="112" rx="14"/>
    <text class="box-title" x="94" y="376">共享介质</text>
    <text class="box-line" x="94" y="408">客户已有资源</text>
    <text class="box-line" x="94" y="434">通过 SubPath 切分范围</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="tool" x="374" y="158" width="234" height="126" rx="16"/>
    <text class="box-title" x="398" y="190">SandboxTool</text>
    <text class="box-line" x="398" y="222">包含 VolumeMounts[]</text>
    <text class="box-line" x="398" y="248">声明 Tool 可用存储</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="tool" x="374" y="330" width="234" height="164" rx="16"/>
    <text class="box-title" x="398" y="362">Tool 侧 VolumeMount</text>
    <text class="box-line" x="398" y="394">Name</text>
    <text class="box-line" x="398" y="420">VolumeTemplateId</text>
    <text class="box-line" x="398" y="446">MountPath / ReadOnly</text>
    <text class="box-line" x="398" y="472">Inherit 默认挂载开关</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="req" x="686" y="158" width="234" height="164" rx="16"/>
    <text class="box-title" x="710" y="190">StartSandboxInstance</text>
    <text class="box-line" x="710" y="222">Metadata[]</text>
    <text class="box-line" x="710" y="248">MountOptions[]</text>
    <text class="box-line" x="710" y="274">按 Name 覆盖或启用</text>
    <text class="box-line" x="710" y="300">不接收 VolumeTemplateId</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="req" x="706" y="380" width="194" height="96" rx="14"/>
    <text class="box-title" x="736" y="414">解析过程</text>
    <text class="box-line" x="736" y="444">合并挂载参数</text>
    <text class="box-line" x="736" y="466">渲染 ${sessionId}</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="inst" x="998" y="158" width="220" height="170" rx="16"/>
    <text class="box-title" x="1022" y="190">SandboxInstance</text>
    <text class="box-line" x="1022" y="222">VolumeMounts[]</text>
    <text class="box-line" x="1022" y="248">最终实际挂载结果</text>
    <text class="box-line" x="1022" y="274">ResolvedSubPath</text>
    <text class="box-line" x="1022" y="300">ResolvedAgentCBSId</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="acbs" x="998" y="398" width="220" height="126" rx="16"/>
    <text class="box-title" x="1022" y="430">AgentCBS</text>
    <text class="box-line" x="1022" y="462">AGS 托管数据盘</text>
    <text class="box-line" x="1022" y="488">Bound / Available</text>
  </g>

  <path class="arrow" d="M 296 228 C 328 228, 340 221, 374 221"/>
  <text class="label" x="310" y="208">VolumeTemplateId</text>

  <path class="arrow" d="M 491 284 L 491 330"/>
  <text class="label" x="510" y="312">包含</text>

  <path class="arrow" d="M 608 412 C 648 412, 660 240, 686 240"/>
  <text class="label" x="620" y="338">Name 匹配</text>
  <text class="note" x="620" y="358">定义可用存储上限</text>

  <path class="arrow" d="M 803 322 L 803 380"/>
  <text class="label" x="820" y="354">合并</text>

  <path class="arrow" d="M 900 428 C 948 428, 950 246, 998 246"/>
  <text class="label" x="910" y="340">写入最终挂载</text>

  <path class="arrow-dashed" d="M 296 274 C 600 612, 890 582, 998 474"/>
  <text class="label" x="438" y="610">Source.Type = AgentCBS 时派生规则来自 VolumeTemplate</text>

  <path class="arrow-dashed" d="M 920 276 C 970 306, 970 410, 998 450"/>
  <text class="label" x="930" y="382">lookup / create / bind</text>

  <path class="arrow" d="M 1108 398 L 1108 328"/>
  <text class="label" x="1122" y="368">ResolvedAgentCBSId</text>

  <path class="arrow-dashed" d="M 179 308 L 179 344"/>
  <text class="label" x="194" y="330">共享介质不派生新资源</text>

  <rect x="48" y="610" width="1184" height="58" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="72" y="637">关键规则：实例级 MountOptions 只能按 Name 覆盖或启用 Tool 已声明的同名挂载；不能在启动实例时引用新的 VolumeTemplate。</text>
  <text class="small" x="72" y="660">AgentCBS 不接管客户已有 CBS，只由 AgentCBS 类型 VolumeTemplate 在创建实例时自动创建或复用。</text>
</svg>
