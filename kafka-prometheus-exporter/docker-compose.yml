version: "3.8"
services:
  ags-kafka-exporter:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "${KAFKA_BROKERS}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-ags-monitor}"
      KAFKA_GROUP: "${KAFKA_GROUP:-ags-prometheus-exporter}"
      KAFKA_SASL_ENABLE: "${KAFKA_SASL_ENABLE:-false}"
      KAFKA_SASL_USER: "${KAFKA_SASL_USER:-}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-}"
      KAFKA_TLS_ENABLE: "${KAFKA_TLS_ENABLE:-false}"
      KAFKA_OFFSET_NEWEST: "${KAFKA_OFFSET_NEWEST:-true}"
      LISTEN_ADDR: ":8080"
      METRIC_TTL_SECONDS: "${METRIC_TTL_SECONDS:-300}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
